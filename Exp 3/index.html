<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript: Exp 3</title>
    <link rel="stylesheet" href="main.css">
    
</head>
<body>
    <div class="box">
        <h1 id="heading">Welcome to  JavaScript Lab</h1>
        <input type="text" id="userinput" placeholder="Enter heading text">
        <button id="changeheading" > Change Heading</button>
        <button id="bgcolorbtn"> Change Background Color</button>
        <button id="increasefontsize"> Increase Font Size</button>
        <button id="decreasefontsize"> Decrease Font Size</button>
        <button id="toggleparagraph"> Toggle Paragraph</button>
        <button id="reset"> Reset</button>
        <p id="paragraph">This is a sample paragraph. You can toggle its visibility using the button above.</p>

    </div>
    <script src="main.js"></script>
</body>
</html>
